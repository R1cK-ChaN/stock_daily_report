# Daily China A-Shares Market Report — Configuration

# Schedule metadata for operators only.
# The runtime does not read this block; the actual weekday 15:01 trigger is installed via macOS launchd.
schedule:
  timezone: "Asia/Shanghai"
  run_time: "15:01"  # After market close at 15:00 CST on trading weekdays

# API Keys (set via environment variables for security)
api_keys:
  openrouter_api_key: ${OPENROUTER_API_KEY}
  anthropic_api_key: ${ANTHROPIC_API_KEY}  # compatibility fallback only
  tradingeconomics_api_key: ${TRADINGECONOMICS_API_KEY}
  wechat_webhook_url: ${WECHAT_WEBHOOK_URL}

# LLM settings (via OpenRouter)
llm:
  base_url: "https://openrouter.ai/api/v1"
  model: "google/gemini-3-flash-preview"
  max_tokens: 4096
  temperature: 0.3  # Low temperature for factual reporting

delivery_retry:
  enabled: true
  max_attempts: 10
  initial_backoff_seconds: 60
  backoff_multiplier: 1
  max_backoff_seconds: 60
  notify_each_blocked: true

# Market indices to track
# code format: "1.XXXXXX" for Shanghai, "0.XXXXXX" for Shenzhen
# Sina codes are derived automatically: 1 -> sh, 0 -> sz
market:
  indices:
    - code: "1.000001"
      name: "上证指数"
    - code: "0.399001"
      name: "深证成指"
    - code: "0.399006"
      name: "创业板指"
    - code: "0.399005"
      name: "中小100"
    - code: "1.000688"
      name: "科创50"
  spot_fetch:
    # Spot universe fetch strategy for breadth/top movers
    source_order: ["em", "em_segmented", "sina"]  # full EM -> segmented EM -> Sina
    enable_sina_fallback: false    # keep failure path fast; breadth falls back to Legu
    request_timeout: 6            # per HTTP request, seconds
    max_retries_per_request: 1    # keep failure path fast
    em_page_size: 2000            # larger page size reduces EM pagination
    overall_timeout_seconds: 30   # cap total time spent on spot fetch
    min_rows: 3000                # accept source only when coverage is sufficient

# Data validation thresholds
validation:
  index_range:
    sse_composite_min: 2000
    sse_composite_max: 8000
    szse_component_min: 5000
    szse_component_max: 20000
    chinext_min: 1000
    chinext_max: 5000
  max_daily_change_pct: 15.0  # Flag if any index moves >15% (circuit breaker territory)
  number_verification_rate: 0.85  # Minimum ratio of report numbers verified against source data
  required_fields:
    - index_prices
    - pboc_repo

# News settings — Jin10 Telegram channel as sole source
news:
  # Telegram channel sources (scraped via t.me/s/ public preview)
  telegram_channels:
    - {name: "Jin10", url: "https://t.me/s/jin10data", category: "china"}
  telegram_fetch_timeout: 15
  telegram_max_age_hours: 24    # Previous 24 hours of news
  telegram_max_pages: 80        # ~1200 messages for high-freq channels

  ranking:
    keyword_top_n: 15           # Wider first pass for high-volume Chinese feed
    llm_top_n: 6                # Keep only the highest-priority macro/viewpoint items
    llm_ranking_enabled: true
    llm_max_tokens: 800

macro_calendar:
  request_timeout: 12
  cache_enabled: true
  source_order: ["tradingeconomics", "fx678", "investing"]

# Sector performance
sectors:
  top_n_gainers: 5
  top_n_losers: 5
  fetch:
    source_order: ["em_industry", "em_concept", "ths_page1"]  # bounded fallback chain
    request_timeout: 6
    max_retries_per_request: 1
    em_page_size: 300
    overall_timeout_seconds: 20

# Output
output:
  directory: "output"
  filename_format: "daily_report_{date}.md"

# PBOC open market operations
pboc:
  rsshub_base_url: ""  # Optional: self-hosted RSSHub URL (e.g. "https://rsshub.example.com")
  listing_url: "https://www.pbc.gov.cn/zhengcehuobisi/125207/125213/125431/125475/index.html"
  base_url: "https://www.pbc.gov.cn"
  request_timeout: 15

# WeChat delivery
wechat:
  enabled: false  # Set to true when webhook URL is configured
  msg_type: "markdown"
